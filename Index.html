<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persistent Bingo Card</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin-top: 20px;
}

#bingo {
    display: grid;
    grid-template-columns: repeat(5, 120px);
    grid-template-rows: repeat(5, 120px);
    gap: 5px;
    margin-top: 20px;
}

.square {
    background: white;
    border: 2px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 10px;
    cursor: pointer;
    user-select: none;
    transition: .2s;
    font-weight: bold;
}

.square:hover {
    background: #eee;
}

.marked {
    background: #3cb371;
    color: white;
}

button {
    margin-top: 20px;
    padding: 10px 25px;
    font-size: 16px;
}
</style>

</head>
<body>

<h1>Bingo Card</h1>

<div id="bingo"></div>

<button onclick="resetCard()">Reset Card</button>

<script src="script.js"></script>

</body>
</html>
